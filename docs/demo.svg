<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <style>
    .msg { opacity: 0; }
    .msg1  { animation: pop 0.4s ease 1s   forwards; }
    .msg2  { animation: pop 0.4s ease 2.2s forwards; }
    .msg3  { animation: pop 0.4s ease 3.5s forwards; }
    .msg4  { animation: pop 0.4s ease 4.8s forwards; }
    .msg5  { animation: pop 0.4s ease 6.1s forwards; }
    .msg6  { animation: pop 0.4s ease 7.4s forwards; }
    .msg7  { animation: pop 0.4s ease 8.5s forwards; }
    .typing { opacity: 0; animation: typingAnim 1.2s ease 5.2s; }
    .evt1  { opacity: 0; animation: slideRight 0.5s ease 1s   forwards; }
    .evt2  { opacity: 0; animation: slideRight 0.5s ease 2.2s forwards; }
    .evt3  { opacity: 0; animation: slideRight 0.5s ease 3.5s forwards; }
    .evt4  { opacity: 0; animation: slideRight 0.5s ease 4.8s forwards; }
    .evt5  { opacity: 0; animation: slideRight 0.5s ease 6.1s forwards; }
    .evt6  { opacity: 0; animation: slideRight 0.5s ease 7.4s forwards; }
    .evt7  { opacity: 0; animation: slideRight 0.5s ease 8.5s forwards; }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.85) translateY(6px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes typingAnim {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .dot1 { animation: bounce 1.2s ease 5.2s infinite; }
    .dot2 { animation: bounce 1.2s ease 5.4s infinite; }
    .dot3 { animation: bounce 1.2s ease 5.6s infinite; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="500" fill="#0F172A" rx="12"/>

  <!-- Title bar -->
  <rect width="800" height="40" fill="#1E293B" rx="12"/>
  <rect y="28" width="800" height="12" fill="#1E293B"/>
  <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="6" fill="#28C840"/>
  <text x="400" y="25" text-anchor="middle" font-size="12" fill="#64748B">Real-time Chat API — WebSocket Demo</text>

  <!-- LEFT PANEL: Client A -->
  <rect x="10" y="48" width="240" height="380" rx="8" fill="#1E293B"/>
  <!-- Header -->
  <rect x="10" y="48" width="240" height="36" rx="8" fill="#273344"/>
  <rect x="10" y="70" width="240" height="14" fill="#273344"/>
  <circle cx="30" cy="66" r="10" fill="#3B82F6"/>
  <text x="30" y="70" text-anchor="middle" font-size="10" fill="white" font-weight="700">A</text>
  <text x="50" y="62" font-size="12" font-weight="600" fill="#E2E8F0">Alice</text>
  <text x="50" y="75" font-size="9" fill="#4ADE80">● online</text>
  <!-- WS indicator -->
  <rect x="195" y="55" width="48" height="18" rx="9" fill="#0F2A1A"/>
  <text x="219" y="67" text-anchor="middle" font-size="8" fill="#4ADE80" class="pulse">WS ●</text>

  <!-- Alice messages -->
  <g class="msg1">
    <rect x="20" y="100" width="175" height="28" rx="14" rx="14" fill="#3B82F6"/>
    <text x="107" y="118" text-anchor="middle" font-size="11" fill="white">Hey Bob! 👋</text>
    <text x="200" y="132" font-size="8" fill="#475569">10:31</text>
  </g>
  <g class="msg3">
    <rect x="20" y="190" width="200" height="28" rx="14" fill="#3B82F6"/>
    <text x="120" y="208" text-anchor="middle" font-size="11" fill="white">Just pushed the PR 🚀</text>
    <text x="220" y="222" font-size="8" fill="#475569">10:33</text>
  </g>
  <g class="msg5">
    <rect x="20" y="290" width="180" height="42" rx="14" fill="#3B82F6"/>
    <text x="110" y="308" text-anchor="middle" font-size="11" fill="white">Lgtm! Added Redis</text>
    <text x="110" y="324" text-anchor="middle" font-size="11" fill="white">pub/sub for scaling</text>
    <text x="200" y="336" font-size="8" fill="#475569">10:35</text>
  </g>
  <g class="msg7">
    <rect x="20" y="370" width="135" height="28" rx="14" fill="#3B82F6"/>
    <text x="87" y="388" text-anchor="middle" font-size="11" fill="white">Review please? 🙏</text>
    <text x="156" y="402" font-size="8" fill="#475569">10:36</text>
  </g>

  <!-- Bob response in Alice's view -->
  <g class="msg2">
    <rect x="55" y="142" width="170" height="28" rx="14" fill="#273344"/>
    <text x="140" y="160" text-anchor="middle" font-size="11" fill="#E2E8F0">Hey Alice! What's up?</text>
    <text x="20" y="174" font-size="8" fill="#475569">10:32</text>
  </g>
  <g class="msg4">
    <rect x="55" y="240" width="155" height="28" rx="14" fill="#273344"/>
    <text x="132" y="258" text-anchor="middle" font-size="11" fill="#E2E8F0">Nice! Let me check 👀</text>
    <text x="20" y="272" font-size="8" fill="#475569">10:34</text>
  </g>

  <!-- Typing indicator Alice's view -->
  <g class="typing">
    <rect x="55" y="340" width="60" height="26" rx="13" fill="#273344"/>
    <circle class="dot1" cx="72" cy="353" r="3" fill="#64748B"/>
    <circle class="dot2" cx="83" cy="353" r="3" fill="#64748B"/>
    <circle class="dot3" cx="94" cy="353" r="3" fill="#64748B"/>
  </g>

  <!-- MIDDLE PANEL: Server Events -->
  <rect x="268" y="48" width="264" height="380" rx="8" fill="#0F172A"/>
  <rect x="268" y="48" width="264" height="36" rx="8" fill="#1E293B"/>
  <rect x="268" y="70" width="264" height="14" fill="#1E293B"/>
  <text x="400" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#94A3B8">Socket.IO Server Events</text>

  <!-- Server event log -->
  <g class="evt1">
    <rect x="278" y="98" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="98" width="3" height="22" rx="1" fill="#4ADE80"/>
    <text x="288" y="108" font-size="9" fill="#4ADE80" font-family="monospace">emit</text>
    <text x="318" y="108" font-size="9" fill="#64748B" font-family="monospace">message:send</text>
    <text x="288" y="118" font-size="8" fill="#334155" font-family="monospace">room: general-dev</text>
  </g>
  <g class="evt2">
    <rect x="278" y="126" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="126" width="3" height="22" rx="1" fill="#60A5FA"/>
    <text x="288" y="136" font-size="9" fill="#60A5FA" font-family="monospace">broadcast</text>
    <text x="338" y="136" font-size="9" fill="#64748B" font-family="monospace">message:new</text>
    <text x="288" y="146" font-size="8" fill="#334155" font-family="monospace">to room → 2 sockets</text>
  </g>
  <g class="evt3">
    <rect x="278" y="154" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="154" width="3" height="22" rx="1" fill="#4ADE80"/>
    <text x="288" y="164" font-size="9" fill="#4ADE80" font-family="monospace">emit</text>
    <text x="318" y="164" font-size="9" fill="#64748B" font-family="monospace">message:send</text>
    <text x="288" y="174" font-size="8" fill="#334155" font-family="monospace">content: "Hey Alice!"</text>
  </g>
  <g class="evt4">
    <rect x="278" y="182" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="182" width="3" height="22" rx="1" fill="#60A5FA"/>
    <text x="288" y="192" font-size="9" fill="#60A5FA" font-family="monospace">broadcast</text>
    <text x="338" y="192" font-size="9" fill="#64748B" font-family="monospace">message:new</text>
    <text x="288" y="202" font-size="8" fill="#334155" font-family="monospace">MongoDB write ✓</text>
  </g>
  <g class="evt5">
    <rect x="278" y="210" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="210" width="3" height="22" rx="1" fill="#FB923C"/>
    <text x="288" y="220" font-size="9" fill="#FB923C" font-family="monospace">emit</text>
    <text x="318" y="220" font-size="9" fill="#64748B" font-family="monospace">typing:start</text>
    <text x="288" y="230" font-size="8" fill="#334155" font-family="monospace">userId: bob-xyz</text>
  </g>
  <g class="evt6">
    <rect x="278" y="238" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="238" width="3" height="22" rx="1" fill="#4ADE80"/>
    <text x="288" y="248" font-size="9" fill="#4ADE80" font-family="monospace">emit</text>
    <text x="318" y="248" font-size="9" fill="#64748B" font-family="monospace">message:send</text>
    <text x="288" y="258" font-size="8" fill="#334155" font-family="monospace">content: "Lgtm! Added Redis..."</text>
  </g>
  <g class="evt7">
    <rect x="278" y="266" width="244" height="22" rx="4" fill="#0D1117"/>
    <rect x="278" y="266" width="3" height="22" rx="1" fill="#C084FC"/>
    <text x="288" y="276" font-size="9" fill="#C084FC" font-family="monospace">emit</text>
    <text x="318" y="276" font-size="9" fill="#64748B" font-family="monospace">message:read</text>
    <text x="288" y="286" font-size="8" fill="#334155" font-family="monospace">readBy: [alice, bob]</text>
  </g>

  <!-- Stats bar -->
  <rect x="278" y="348" width="244" height="70" rx="6" fill="#0D1117"/>
  <text x="400" y="366" text-anchor="middle" font-size="10" fill="#475569">Connection Stats</text>
  <text x="310" y="386" font-size="9" fill="#64748B">Connected:</text>
  <text x="365" y="386" font-size="9" fill="#4ADE80" font-weight="700">2 clients</text>
  <text x="310" y="402" font-size="9" fill="#64748B">Rooms active:</text>
  <text x="380" y="402" font-size="9" fill="#60A5FA" font-weight="700">1</text>
  <text x="310" y="418" font-size="9" fill="#64748B">Messages/min:</text>
  <text x="385" y="418" font-size="9" fill="#FB923C" font-weight="700">~5</text>

  <!-- RIGHT PANEL: Client B - Bob -->
  <rect x="550" y="48" width="240" height="380" rx="8" fill="#1E293B"/>
  <rect x="550" y="48" width="240" height="36" rx="8" fill="#273344"/>
  <rect x="550" y="70" width="240" height="14" fill="#273344"/>
  <circle cx="570" cy="66" r="10" fill="#8B5CF6"/>
  <text x="570" y="70" text-anchor="middle" font-size="10" fill="white" font-weight="700">B</text>
  <text x="590" y="62" font-size="12" font-weight="600" fill="#E2E8F0">Bob</text>
  <text x="590" y="75" font-size="9" fill="#4ADE80">● online</text>
  <rect x="735" y="55" width="48" height="18" rx="9" fill="#0F2A1A"/>
  <text x="759" y="67" text-anchor="middle" font-size="8" fill="#4ADE80" class="pulse">WS ●</text>

  <!-- Bob sees Alice's messages -->
  <g class="msg1">
    <rect x="560" y="100" width="130" height="28" rx="14" fill="#273344"/>
    <text x="625" y="118" text-anchor="middle" font-size="11" fill="#E2E8F0">Hey Bob! 👋</text>
    <text x="700" y="132" font-size="8" fill="#475569">10:31</text>
  </g>
  <g class="msg3">
    <rect x="560" y="190" width="200" height="28" rx="14" fill="#273344"/>
    <text x="660" y="208" text-anchor="middle" font-size="11" fill="#E2E8F0">Just pushed the PR 🚀</text>
    <text x="765" y="222" font-size="8" fill="#475569">10:33</text>
  </g>
  <g class="msg5">
    <rect x="560" y="290" width="180" height="42" rx="14" fill="#273344"/>
    <text x="650" y="308" text-anchor="middle" font-size="11" fill="#E2E8F0">Lgtm! Added Redis</text>
    <text x="650" y="324" text-anchor="middle" font-size="11" fill="#E2E8F0">pub/sub for scaling</text>
    <text x="765" y="336" font-size="8" fill="#475569">10:35</text>
  </g>
  <g class="msg7">
    <rect x="560" y="370" width="135" height="28" rx="14" fill="#273344"/>
    <text x="627" y="388" text-anchor="middle" font-size="11" fill="#E2E8F0">Review please? 🙏</text>
    <text x="700" y="402" font-size="8" fill="#475569">10:36</text>
  </g>

  <!-- Bob's own messages -->
  <g class="msg2">
    <rect x="570" y="142" width="200" height="28" rx="14" fill="#8B5CF6"/>
    <text x="670" y="160" text-anchor="middle" font-size="11" fill="white">Hey Alice! What's up?</text>
    <text x="560" y="174" font-size="8" fill="#475569">10:32</text>
  </g>
  <g class="msg4">
    <rect x="585" y="240" width="160" height="28" rx="14" fill="#8B5CF6"/>
    <text x="665" y="258" text-anchor="middle" font-size="11" fill="white">Nice! Let me check 👀</text>
    <text x="560" y="272" font-size="8" fill="#475569">10:34</text>
  </g>

  <!-- Typing indicator Bob's view -->
  <g class="typing">
    <rect x="560" y="340" width="60" height="26" rx="13" fill="#273344"/>
    <circle class="dot1" cx="577" cy="353" r="3" fill="#64748B"/>
    <circle class="dot2" cx="588" cy="353" r="3" fill="#64748B"/>
    <circle class="dot3" cx="599" cy="353" r="3" fill="#64748B"/>
  </g>

  <!-- Bottom bar -->
  <rect x="10" y="440" width="780" height="50" rx="8" fill="#1E293B"/>
  <text x="400" y="460" text-anchor="middle" font-size="11" fill="#94A3B8">Built with Node.js · Socket.IO · MongoDB · Redis Pub/Sub · JWT</text>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="#475569">github.com/yourusername/realtime-chat-api</text>
</svg>

<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563EB"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="960" height="580" fill="#F9FAFB" rx="12"/>
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Real-time Chat API — Architecture Diagram</text>

  <!-- CLIENTS -->
  <rect x="30" y="60" width="120" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="90" y="81" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Client A</text>
  <text x="90" y="97" text-anchor="middle" font-size="9" fill="#3B82F6">Instance 1 socket</text>

  <rect x="30" y="130" width="120" height="52" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="90" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Client B</text>
  <text x="90" y="167" text-anchor="middle" font-size="9" fill="#059669">Instance 2 socket</text>

  <!-- LOAD BALANCER -->
  <rect x="195" y="80" width="130" height="82" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="260" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Load Balancer</text>
  <text x="260" y="124" text-anchor="middle" font-size="9" fill="#7C3AED">Nginx / AWS ALB</text>
  <text x="260" y="141" text-anchor="middle" font-size="9" fill="#7C3AED">sticky sessions</text>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="#7C3AED">or IP hash</text>

  <!-- Arrows: clients → LB -->
  <line x1="150" y1="87" x2="195" y2="107" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="150" y1="157" x2="195" y2="140" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- INSTANCE 1 -->
  <rect x="380" y="55" width="185" height="155" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="472" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#9A3412">App Instance 1</text>
  <rect x="395" y="86" width="155" height="28" rx="4" fill="#FFEDD5"/>
  <text x="472" y="104" text-anchor="middle" font-size="10" fill="#C2410C">Express REST API</text>
  <rect x="395" y="120" width="155" height="28" rx="4" fill="#FFEDD5"/>
  <text x="472" y="138" text-anchor="middle" font-size="10" fill="#C2410C">Socket.IO Server</text>
  <rect x="395" y="154" width="155" height="28" rx="4" fill="#FFEDD5"/>
  <text x="472" y="172" text-anchor="middle" font-size="10" fill="#C2410C">Redis Adapter (pub)</text>

  <!-- INSTANCE 2 -->
  <rect x="380" y="235" width="185" height="155" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="472" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">App Instance 2</text>
  <rect x="395" y="266" width="155" height="28" rx="4" fill="#DCFCE7"/>
  <text x="472" y="284" text-anchor="middle" font-size="10" fill="#047857">Express REST API</text>
  <rect x="395" y="300" width="155" height="28" rx="4" fill="#DCFCE7"/>
  <text x="472" y="318" text-anchor="middle" font-size="10" fill="#047857">Socket.IO Server</text>
  <rect x="395" y="334" width="155" height="28" rx="4" fill="#DCFCE7"/>
  <text x="472" y="352" text-anchor="middle" font-size="10" fill="#047857">Redis Adapter (sub)</text>

  <!-- Arrows: LB → Instances -->
  <line x1="325" y1="107" x2="380" y2="120" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)" stroke-dasharray="5,2"/>
  <line x1="325" y1="140" x2="380" y2="300" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)" stroke-dasharray="5,2"/>

  <!-- REDIS -->
  <rect x="630" y="130" width="185" height="130" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="722" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">Redis</text>
  <rect x="645" y="162" width="155" height="24" rx="4" fill="#FEE2E2"/>
  <text x="722" y="178" text-anchor="middle" font-size="10" fill="#DC2626">Pub/Sub Adapter</text>
  <rect x="645" y="191" width="155" height="24" rx="4" fill="#FEE2E2"/>
  <text x="722" y="207" text-anchor="middle" font-size="10" fill="#DC2626">Refresh Token Store</text>
  <rect x="645" y="220" width="155" height="24" rx="4" fill="#FEE2E2"/>
  <text x="722" y="236" text-anchor="middle" font-size="10" fill="#DC2626">Online Presence Map</text>

  <!-- Arrows: Instances → Redis -->
  <line x1="565" y1="154" x2="630" y2="185" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="332" x2="630" y2="235" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="594" y="255" font-size="9" fill="#EF4444">PUBLISH</text>
  <text x="594" y="185" font-size="9" fill="#EF4444">SUBSCRIBE</text>

  <!-- MONGODB -->
  <rect x="630" y="310" width="185" height="130" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="722" y="333" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">MongoDB</text>
  <rect x="645" y="342" width="155" height="24" rx="4" fill="#DBEAFE"/>
  <text x="722" y="358" text-anchor="middle" font-size="10" fill="#2563EB">users collection</text>
  <rect x="645" y="371" width="155" height="24" rx="4" fill="#DBEAFE"/>
  <text x="722" y="387" text-anchor="middle" font-size="10" fill="#2563EB">rooms collection</text>
  <rect x="645" y="400" width="155" height="24" rx="4" fill="#DBEAFE"/>
  <text x="722" y="416" text-anchor="middle" font-size="10" fill="#2563EB">messages (idx: roomId+date)</text>

  <!-- Arrows: Instances → MongoDB -->
  <line x1="565" y1="134" x2="630" y2="350" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="565" y1="355" x2="630" y2="390" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- SOCKET EVENT FLOW BOX -->
  <rect x="30" y="450" width="560" height="115" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="310" y="473" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">WebSocket Event Flow — Cross-Instance Message</text>
  <text x="45" y="496" font-size="10" fill="#4B5563">1.</text>
  <text x="57" y="496" font-size="10" fill="#374151">Client A (Instance 1) emits  message:send  →  Socket.IO receives it</text>
  <text x="45" y="515" font-size="10" fill="#4B5563">2.</text>
  <text x="57" y="515" font-size="10" fill="#374151">Message saved to MongoDB  →  Redis PUBLISH to channel room:{roomId}</text>
  <text x="45" y="534" font-size="10" fill="#4B5563">3.</text>
  <text x="57" y="534" font-size="10" fill="#374151">Instance 2 SUBSCRIBES to that channel  →  receives the payload</text>
  <text x="45" y="553" font-size="10" fill="#4B5563">4.</text>
  <text x="57" y="553" font-size="10" fill="#374151">Instance 2 emits  message:new  to Client B  →  delivered in real time ✓</text>

  <!-- Legend -->
  <rect x="650" y="458" width="285" height="110" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="792" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Legend</text>
  <line x1="668" y1="498" x2="700" y2="498" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-purple)"/>
  <text x="708" y="502" font-size="9" fill="#374151">Load balanced request</text>
  <line x1="668" y1="520" x2="700" y2="520" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="708" y="524" font-size="9" fill="#374151">Redis Pub/Sub</text>
  <line x1="668" y1="542" x2="700" y2="542" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="708" y="546" font-size="9" fill="#374151">MongoDB read/write</text>
</svg>
